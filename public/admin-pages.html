<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin Pages - AdvanceTeach</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #3b30b0;
      --primary-light: #eef2ff;
      --text: #0f172a;
      --text-light: #334155;
      --text-muted: #64748b;
      --bg: #f8fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 18px 32px -12px rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 24px;
      --radius-md: 16px;
      --danger: #dc2626;
      --success: #059669;
      --sidebar-width: 260px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(125deg, #f1f5f9 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .admin-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-width);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(79, 70, 229, 0.12);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1.5rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .logo-brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
    }

    .logo-img { height: 40px; width: auto; }

    .brand-text {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0f172a 0%, var(--primary) 80%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .brand-text span { color: var(--primary); background: none; }

    .admin-nav {
      flex: 1;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .admin-nav a {
      text-decoration: none;
      font-weight: 500;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      margin: 0 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .admin-nav a i { width: 24px; color: var(--text-muted); }

    .admin-nav a:hover,
    .admin-nav a.active {
      background: var(--primary-light);
      color: var(--primary);
    }

    .admin-nav a:hover i,
    .admin-nav a.active i {
      color: var(--primary);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79, 70, 229, 0.12);
      padding: 0.85rem 2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .lang-switch {
      background: #f0f3fe;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      display: inline-flex;
      gap: 8px;
    }

    .lang-switch a {
      text-decoration: none;
      color: #1e293b;
      padding: 0 4px;
    }

    .lang-switch a.active {
      color: var(--primary);
      font-weight: 700;
    }

    .logout-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover { background: #fecaca; }

    .page-wrap {
      padding: 2rem;
    }

    .page-title {
      margin-bottom: 1.5rem;
    }

    .page-title h1 {
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .page-title p {
      color: var(--text-light);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
    }

    .card h2 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .pages-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 70vh;
      overflow: auto;
      padding-right: 4px;
    }

    .page-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }

    .page-item:hover,
    .page-item.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .page-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .page-item small {
      color: var(--text-muted);
      display: block;
    }

    .page-item .page-badge {
      display: inline-flex;
      width: fit-content;
      margin-top: 8px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #fff7ed;
      color: #c2410c;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .lang-box {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fafbff;
    }

    .lang-box h3 {
      margin-bottom: 12px;
      font-size: 1rem;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
      background: white;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .checkbox-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .checkbox-row label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      cursor: pointer;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    footer {
      background: #0f172a;
      color: #94a3b8;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      margin-top: auto;
    }

    @media (max-width: 980px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .admin-nav { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .admin-nav a { padding: 8px 16px; }
      .top-bar { justify-content: center; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="logo-brand">
        <img src="images/logo-advanceteach.png" alt="AdvanceTeach" class="logo-img" onerror="this.src='https://placehold.co/200x60?text=AT'">
        <div class="brand-text">Advance<span>Teach</span></div>
      </a>
    </div>

    <nav class="admin-nav">
      <a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> <span data-key="dashboard">Dashboard</span></a>
      <a href="admin-demandes.html"><i class="fas fa-inbox"></i> <span data-key="requests">Demandes</span></a>
      <a href="admin-offres.html"><i class="fas fa-tags"></i> <span data-key="offers">Offres</span></a>
      <a href="admin-services.html"><i class="fas fa-cogs"></i> <span data-key="services">Services</span></a>
      <a href="admin-projets.html"><i class="fas fa-rocket"></i> <span data-key="projects">Réalisations</span></a>
      <a href="admin-pages.html" class="active"><i class="fas fa-file-alt"></i> <span data-key="pages">Pages</span></a>
      <a href="admin-sections.html"><i class="fas fa-layer-group"></i> <span data-key="sections">Sections</span></a>
      <a href="admin-media.html"><i class="fas fa-images"></i> <span data-key="media">Médias</span></a>
    </nav>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <div class="lang-switch">
        <a href="#" data-lang="en" class="lang-en active">🇬🇧 EN</a> |
        <a href="#" data-lang="fr" class="lang-fr">🇫🇷 FR</a>
      </div>
      <button id="logoutBtn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> <span data-key="logout">Logout</span>
      </button>
    </div>

    <main class="page-wrap">
      <div class="page-title">
        <h1 data-key="pagesTitle">Pages management</h1>
        <p data-key="pagesSubtitle">Edit existing pages (home, about, services, etc.) in both languages.</p>
      </div>

      <div class="content-grid">
        <section class="card">
          <h2 data-key="pagesList">Pages list</h2>
          <div id="pagesList" class="pages-list"></div>
        </section>

        <section class="card">
          <h2 data-key="pageForm">Page editor</h2>

          <form id="pageForm">
            <input type="hidden" id="pageId">
            <input type="hidden" id="pageSlug">

            <div class="form-grid">
              <div class="lang-box">
                <h3 data-key="langEn">English</h3>

                <div class="form-group">
                  <label data-key="titleEn">Title EN</label>
                  <input type="text" id="titleEn" required>
                </div>

                <div class="form-group">
                  <label data-key="contentEn">Content EN</label>
                  <textarea id="contentEn" rows="8"></textarea>
                </div>

                <div class="form-group">
                  <label data-key="metaTitleEn">Meta title EN</label>
                  <input type="text" id="metaTitleEn" placeholder="SEO title">
                </div>

                <div class="form-group">
                  <label data-key="metaDescEn">Meta description EN</label>
                  <textarea id="metaDescEn" rows="2" placeholder="SEO description"></textarea>
                </div>
              </div>

              <div class="lang-box">
                <h3 data-key="langFr">Français</h3>

                <div class="form-group">
                  <label data-key="titleFr">Titre FR</label>
                  <input type="text" id="titleFr" required>
                </div>

                <div class="form-group">
                  <label data-key="contentFr">Contenu FR</label>
                  <textarea id="contentFr" rows="8"></textarea>
                </div>

                <div class="form-group">
                  <label data-key="metaTitleFr">Meta titre FR</label>
                  <input type="text" id="metaTitleFr" placeholder="Titre SEO">
                </div>

                <div class="form-group">
                  <label data-key="metaDescFr">Meta description FR</label>
                  <textarea id="metaDescFr" rows="2" placeholder="Description SEO"></textarea>
                </div>
              </div>

              <div class="form-group full">
                <label data-key="heroImage">Hero image</label>
                <input type="text" id="heroImage" placeholder="/uploads/hero.jpg">
              </div>

              <div class="form-group full">
                <label data-key="status">Status</label>
                <div class="checkbox-row">
                  <label><input type="checkbox" id="isPublished" checked> <span data-key="published">Published</span></label>
                </div>
              </div>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> <span data-key="save">Save</span>
              </button>

              <button type="button" id="resetBtn" class="btn btn-secondary">
                <i class="fas fa-rotate-left"></i> <span data-key="reset">Reset</span>
              </button>
            </div>

            <div id="formMessage" class="message"></div>
          </form>
        </section>
      </div>
    </main>

    <footer><span data-key="footer">© 2025 AdvanceTeach — Admin Interface</span></footer>
  </div>
</div>

<script>
  let currentLang = localStorage.getItem('adminLang') || 'en';
  let currentAdmin = null;
  let currentPage = null;
  let loadedPages = [];

  const DEFAULT_QUOTE_PAGE = {
    id: null,
    slug: 'devis',
    title_en: 'Request a Tailored Quote',
    title_fr: 'Demandez un devis sur mesure',
    content_en: 'Tell us about your needs and AdvanceTeach will prepare a solution tailored to your goals, context and timeline.',
    content_fr: 'Présentez vos besoins et AdvanceTeach préparera une solution adaptée à vos objectifs, votre contexte et votre calendrier.',
    meta_title_en: 'Request a Quote | AdvanceTeach',
    meta_title_fr: 'Demander un devis | AdvanceTeach',
    meta_description_en: 'Request a tailored quote for AI consulting, training, intelligent platforms or custom web applications.',
    meta_description_fr: 'Demandez un devis personnalisé pour une formation en IA, une plateforme intelligente, une application web ou un accompagnement stratégique.',
    hero_image: '/uploads/devis-hero.png',
    is_published: true,
    _isVirtual: true
  };

  const translations = {
    en: {
      dashboard: "Dashboard",
      requests: "Requests",
      offers: "Offers",
      services: "Services",
      projects: "Projects",
      pages: "Pages",
      sections: "Sections",
      media: "Media",
      logout: "Logout",
      pagesTitle: "Pages management",
      pagesSubtitle: "Edit existing pages (home, about, services, etc.) in both languages.",
      pagesList: "Pages list",
      pageForm: "Page editor",
      titleEn: "Title EN",
      titleFr: "Title FR",
      contentEn: "Content EN",
      contentFr: "Content FR",
      metaTitleEn: "Meta title EN",
      metaTitleFr: "Meta title FR",
      metaDescEn: "Meta description EN",
      metaDescFr: "Meta description FR",
      heroImage: "Hero image",
      status: "Status",
      published: "Published",
      save: "Save",
      reset: "Reset",
      footer: "© 2025 AdvanceTeach — Admin Interface",
      loading: "Loading...",
      noPages: "No pages found.",
      updateSuccess: "Page updated successfully.",
      sessionExpired: "Session expired. Please log in again.",
      pageTitleTag: "Admin Pages - AdvanceTeach",
      langEn: "English",
      langFr: "French",
      slugLabel: "Slug",
      genericError: "Error",
      noPageSelected: "No page selected",
      quotePageToCreate: "Page to create",
      createSuccess: "Quote page created successfully.",
      createError: "Unable to create the quote page. Check that the POST /api/admin/pages route exists."
    },
    fr: {
      dashboard: "Dashboard",
      requests: "Demandes",
      offers: "Offres",
      services: "Services",
      projects: "Réalisations",
      pages: "Pages",
      sections: "Sections",
      media: "Médias",
      logout: "Déconnexion",
      pagesTitle: "Gestion des pages",
      pagesSubtitle: "Modifier les pages existantes (accueil, à propos, services, etc.) dans les deux langues.",
      pagesList: "Liste des pages",
      pageForm: "Éditeur de page",
      titleEn: "Titre EN",
      titleFr: "Titre FR",
      contentEn: "Contenu EN",
      contentFr: "Contenu FR",
      metaTitleEn: "Meta titre EN",
      metaTitleFr: "Meta titre FR",
      metaDescEn: "Meta description EN",
      metaDescFr: "Meta description FR",
      heroImage: "Image hero",
      status: "Statut",
      published: "Publié",
      save: "Enregistrer",
      reset: "Réinitialiser",
      footer: "© 2025 AdvanceTeach — Interface Admin",
      loading: "Chargement...",
      noPages: "Aucune page trouvée.",
      updateSuccess: "Page mise à jour avec succès.",
      sessionExpired: "Session expirée. Veuillez vous reconnecter.",
      pageTitleTag: "Administration des pages - AdvanceTeach",
      langEn: "Anglais",
      langFr: "Français",
      slugLabel: "Slug",
      genericError: "Erreur",
      noPageSelected: "Aucune page sélectionnée",
      quotePageToCreate: "Page à créer",
      createSuccess: "La page Devis a été créée avec succès.",
      createError: "Impossible de créer la page Devis. Vérifiez que la route POST /api/admin/pages existe."
    }
  };

  function t(key) {
    return translations[currentLang][key] || key;
  }

  function updateUILanguage() {
    document.title = t('pageTitleTag');

    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (translations[currentLang][key]) {
        el.textContent = translations[currentLang][key];
      }
    });

    document.querySelectorAll('.lang-switch a').forEach(link => {
      link.classList.toggle('active', link.getAttribute('data-lang') === currentLang);
    });
  }

  async function checkSession() {
    try {
      const response = await fetch('/api/admin/check', {
        credentials: 'same-origin'
      });
      const data = await response.json();

      if (!data.loggedIn) {
        window.location.href = 'admin-login.html';
        return false;
      }

      currentAdmin = data.admin;
      return true;
    } catch (error) {
      window.location.href = 'admin-login.html';
      return false;
    }
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, character => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[character]));
  }

  function showMessage(type, text) {
    const box = document.getElementById('formMessage');
    box.className = `message ${type}`;
    box.textContent = text;
  }

  function resetForm() {
    currentPage = null;
    document.getElementById('pageId').value = '';
    document.getElementById('pageSlug').value = '';
    document.getElementById('titleEn').value = '';
    document.getElementById('titleFr').value = '';
    document.getElementById('contentEn').value = '';
    document.getElementById('contentFr').value = '';
    document.getElementById('metaTitleEn').value = '';
    document.getElementById('metaTitleFr').value = '';
    document.getElementById('metaDescEn').value = '';
    document.getElementById('metaDescFr').value = '';
    document.getElementById('heroImage').value = '';
    document.getElementById('isPublished').checked = true;
    document.getElementById('formMessage').className = 'message';
    document.getElementById('formMessage').textContent = '';
    document.querySelectorAll('.page-item').forEach(item => item.classList.remove('active'));
  }

  function fillForm(page) {
    currentPage = page;
    document.getElementById('pageId').value = page.id;
    document.getElementById('pageSlug').value = page.slug;
    document.getElementById('titleEn').value = page.title_en || '';
    document.getElementById('titleFr').value = page.title_fr || '';
    document.getElementById('contentEn').value = page.content_en || '';
    document.getElementById('contentFr').value = page.content_fr || '';
    document.getElementById('metaTitleEn').value = page.meta_title_en || '';
    document.getElementById('metaTitleFr').value = page.meta_title_fr || '';
    document.getElementById('metaDescEn').value = page.meta_description_en || '';
    document.getElementById('metaDescFr').value = page.meta_description_fr || '';
    document.getElementById('heroImage').value = page.hero_image || '';
    document.getElementById('isPublished').checked = !!page.is_published;
  }

  function renderPagesList(pages) {
    const list = document.getElementById('pagesList');
    list.innerHTML = '';

    pages.forEach(page => {
      const item = document.createElement('div');
      item.className = 'page-item';
      item.dataset.slug = page.slug;

      item.innerHTML = `
        <strong>${escapeHtml(page.title_en || page.slug)}</strong>
        <small>${escapeHtml(page.title_fr || page.slug)}</small>
        <small>${t('slugLabel')}: ${escapeHtml(page.slug)}</small>
        ${page._isVirtual ? `<span class="page-badge">${t('quotePageToCreate')}</span>` : ''}
      `;

      item.addEventListener('click', () => {
        document.querySelectorAll('.page-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        fillForm(page);
      });

      list.appendChild(item);
    });
  }

  async function loadPages(preferredSlug = null) {
    const list = document.getElementById('pagesList');
    list.innerHTML = `<div class="page-item">${t('loading')}</div>`;

    try {
      const response = await fetch('/api/admin/pages', {
        credentials: 'same-origin'
      });

      if (response.status === 401) {
        showMessage('error', t('sessionExpired'));
        setTimeout(() => window.location.href = 'admin-login.html', 800);
        return;
      }

      const data = await response.json();
      const apiPages = data.success && Array.isArray(data.data) ? data.data : [];

      const quoteExists = apiPages.some(page => page.slug === 'devis');
      loadedPages = quoteExists
        ? apiPages
        : [...apiPages, { ...DEFAULT_QUOTE_PAGE }];

      if (!loadedPages.length) {
        list.innerHTML = `<div class="page-item">${t('noPages')}</div>`;
        return;
      }

      loadedPages.sort((a, b) => {
        if (a.slug === 'devis') return -1;
        if (b.slug === 'devis') return 1;
        return String(a.title_en || a.slug).localeCompare(String(b.title_en || b.slug));
      });

      renderPagesList(loadedPages);

      const slugToSelect =
        preferredSlug ||
        new URLSearchParams(window.location.search).get('slug');

      if (slugToSelect) {
        const pageToSelect = loadedPages.find(page => page.slug === slugToSelect);
        const itemToSelect = document.querySelector(`.page-item[data-slug="${CSS.escape(slugToSelect)}"]`);

        if (pageToSelect && itemToSelect) {
          itemToSelect.classList.add('active');
          fillForm(pageToSelect);
        }
      }
    } catch (error) {
      console.error('Error loading pages:', error);
      list.innerHTML = `<div class="page-item">${t('genericError')}</div>`;
    }
  }

  async function createPage(payload) {
    const response = await fetch('/api/admin/pages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        slug: 'devis',
        ...payload
      })
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok || !data.success) {
      throw new Error(data.message || t('createError'));
    }

    return data;
  }

  async function savePage(e) {
    e.preventDefault();

    const slug = document.getElementById('pageSlug').value.trim();
    if (!slug) {
      showMessage('error', t('noPageSelected'));
      return;
    }

    const payload = {
      title_en: document.getElementById('titleEn').value.trim(),
      title_fr: document.getElementById('titleFr').value.trim(),
      content_en: document.getElementById('contentEn').value.trim(),
      content_fr: document.getElementById('contentFr').value.trim(),
      meta_title_en: document.getElementById('metaTitleEn').value.trim(),
      meta_title_fr: document.getElementById('metaTitleFr').value.trim(),
      meta_description_en: document.getElementById('metaDescEn').value.trim(),
      meta_description_fr: document.getElementById('metaDescFr').value.trim(),
      hero_image: document.getElementById('heroImage').value.trim(),
      is_published: document.getElementById('isPublished').checked
    };

    try {
      let data;

      if (currentPage && currentPage._isVirtual) {
        data = await createPage(payload);
        showMessage('success', t('createSuccess'));
      } else {
        const response = await fetch(`/api/admin/pages/${encodeURIComponent(slug)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(payload)
        });

        data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || t('genericError'));
        }

        showMessage('success', t('updateSuccess'));
      }

      await loadPages(slug);

      if (data.data) {
        const savedPage = { ...data.data, _isVirtual: false };
        fillForm(savedPage);
      }
    } catch (error) {
      console.error('Error saving page:', error);
      showMessage('error', error.message || t('genericError'));
    }
  }

  document.querySelectorAll('.lang-switch a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      currentLang = link.getAttribute('data-lang');
      localStorage.setItem('adminLang', currentLang);
      updateUILanguage();
      loadPages(currentPage ? currentPage.slug : null);
    });
  });

  document.getElementById('pageForm').addEventListener('submit', savePage);
  document.getElementById('resetBtn').addEventListener('click', resetForm);

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await fetch('/api/admin/logout', {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (error) {
    } finally {
      window.location.href = 'admin-login.html';
    }
  });

  (async function init() {
    updateUILanguage();
    const ok = await checkSession();
    if (ok) {
      resetForm();
      loadPages();
    }
  })();
</script>
</body>
</html>

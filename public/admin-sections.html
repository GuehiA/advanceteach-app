<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-key="pageTitleTag">Admin Sections - AdvanceTeach</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #3b30b0;
      --primary-light: #eef2ff;
      --text: #0f172a;
      --text-light: #334155;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 24px;
      --radius-md: 16px;
      --danger: #dc2626;
      --success: #059669;
      --sidebar-width: 260px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(125deg, #f1f5f9 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .admin-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-width);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(79, 70, 229, 0.12);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1.5rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .logo-brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
    }

    .logo-img { height: 40px; width: auto; }

    .brand-text {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0f172a 0%, var(--primary) 80%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .brand-text span { color: var(--primary); background: none; }

    .admin-nav {
      flex: 1;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .admin-nav a {
      text-decoration: none;
      font-weight: 500;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      margin: 0 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .admin-nav a i { width: 24px; color: var(--text-muted); }

    .admin-nav a:hover,
    .admin-nav a.active {
      background: var(--primary-light);
      color: var(--primary);
    }

    .admin-nav a:hover i,
    .admin-nav a.active i {
      color: var(--primary);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79, 70, 229, 0.12);
      padding: 0.85rem 2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .lang-switch {
      background: #f0f3fe;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      display: inline-flex;
      gap: 8px;
    }

    .lang-switch a {
      text-decoration: none;
      color: #1e293b;
      padding: 0 4px;
    }

    .lang-switch a.active {
      color: var(--primary);
      font-weight: 700;
    }

    .logout-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover { background: #fecaca; }

    .page-wrap { padding: 2rem; }

    .page-title {
      margin-bottom: 1.5rem;
    }

    .page-title h1 {
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .page-title p {
      color: var(--text-light);
    }

    .toolbar-card,
    .list-card,
    .form-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      margin-bottom: 24px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      gap: 24px;
      align-items: start;
    }

    .toolbar-row {
      display: grid;
      grid-template-columns: 1.2fr auto;
      gap: 16px;
      align-items: end;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full { grid-column: 1 / -1; }

    .lang-box {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fafbff;
    }

    .lang-box h3 {
      margin-bottom: 12px;
      font-size: 1rem;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: white;
    }

    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .checkbox-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .checkbox-row label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      cursor: pointer;
    }

    .section-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 70vh;
      overflow: auto;
      padding-right: 4px;
    }

    .section-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }

    .section-item:hover,
    .section-item.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .section-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .section-item small {
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    footer {
      background: #0f172a;
      color: #94a3b8;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      margin-top: auto;
    }

    @media (max-width: 980px) {
      .content-grid,
      .toolbar-row,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .admin-nav { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .admin-nav a { padding: 8px 16px; }
      .top-bar { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="logo-brand">
        <img src="images/logo-advanceteach.png" alt="AdvanceTeach" class="logo-img" onerror="this.src='https://placehold.co/200x60?text=AT'">
        <div class="brand-text">Advance<span>Teach</span></div>
      </a>
    </div>

    <nav class="admin-nav">
      <a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> <span data-key="dashboard">Dashboard</span></a>
      <a href="admin-demandes.html"><i class="fas fa-inbox"></i> <span data-key="quoteRequests">Quote requests</span></a>
      <a href="admin-offres.html"><i class="fas fa-tags"></i> <span data-key="offers">Offers</span></a>
      <a href="admin-services.html"><i class="fas fa-cogs"></i> <span data-key="services">Services</span></a>
      <a href="admin-projets.html"><i class="fas fa-rocket"></i> <span data-key="projects">Projects</span></a>
      <a href="admin-pages.html"><i class="fas fa-file-alt"></i> <span data-key="pages">Pages</span></a>
      <a href="admin-sections.html" class="active"><i class="fas fa-layer-group"></i> <span data-key="sections">Sections</span></a>
      <a href="admin-media.html"><i class="fas fa-images"></i> <span data-key="media">Media</span></a>
    </nav>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <div class="lang-switch">
        <a href="#" data-lang="en" class="lang-en active">🇬🇧 <span data-key="langEn">English</span></a> |
        <a href="#" data-lang="fr" class="lang-fr">🇫🇷 <span data-key="langFr">Français</span></a>
      </div>
      <button id="logoutBtn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> <span data-key="logout">Logout</span>
      </button>
    </div>

    <main class="page-wrap">
      <div class="page-title">
        <h1 data-key="sectionsTitle">Sections management</h1>
        <p data-key="sectionsSubtitle">Add, edit, disable or remove internal sections of a page.</p>
      </div>

      <section class="toolbar-card">
        <div class="toolbar-row">
          <div class="form-group">
            <label for="pageSlugSelect" data-key="selectPage">Select page</label>
            <select id="pageSlugSelect"></select>
          </div>
          <button type="button" id="newSectionBtn" class="btn btn-primary">
            <i class="fas fa-plus"></i> <span data-key="newSection">New section</span>
          </button>
        </div>
      </section>

      <div class="content-grid">
        <section class="list-card">
          <h2 data-key="sectionsList">Sections list</h2>
          <div id="sectionsList" class="section-list"></div>
        </section>

        <section class="form-card">
          <h2 data-key="sectionForm">Section editor</h2>

          <form id="sectionForm">
            <input type="hidden" id="sectionId">

            <div class="form-grid">
              <div class="form-group">
                <label data-key="sectionKey">Section key</label>
                <input type="text" id="sectionKey" required>
              </div>

              <div class="form-group">
                <label data-key="sectionType">Section type</label>
                <select id="sectionType">
                  <option value="text">text</option>
                  <option value="cards_intro">cards_intro</option>
                  <option value="cta">cta</option>
                  <option value="hero_extra">hero_extra</option>
                </select>
              </div>

              <div class="lang-box">
                <h3 data-key="langEn">English</h3>

                <div class="form-group">
                  <label data-key="titleEn">Title EN</label>
                  <input type="text" id="titleEn">
                </div>

                <div class="form-group">
                  <label data-key="contentEn">Content EN</label>
                  <textarea id="contentEn"></textarea>
                </div>

                <div class="form-group">
                  <label data-key="buttonTextEn">Button text EN</label>
                  <input type="text" id="buttonTextEn">
                </div>
              </div>

              <div class="lang-box">
                <h3 data-key="langFr">Français</h3>

                <div class="form-group">
                  <label data-key="titleFr">Title FR</label>
                  <input type="text" id="titleFr">
                </div>

                <div class="form-group">
                  <label data-key="contentFr">Content FR</label>
                  <textarea id="contentFr"></textarea>
                </div>

                <div class="form-group">
                  <label data-key="buttonTextFr">Button text FR</label>
                  <input type="text" id="buttonTextFr">
                </div>
              </div>

              <div class="form-group">
                <label data-key="imagePath">Image path</label>
                <input type="text" id="imagePath" placeholder="/uploads/image.jpg">
              </div>

              <div class="form-group">
                <label data-key="buttonLink">Button link</label>
                <input type="text" id="buttonLink" placeholder="contact.html">
              </div>

              <div class="form-group">
                <label data-key="displayOrder">Display order</label>
                <input type="number" id="displayOrder" value="0">
              </div>

              <div class="form-group">
                <label data-key="status">Status</label>
                <div class="checkbox-row">
                  <label>
                    <input type="checkbox" id="isActive" checked>
                    <span data-key="active">Active</span>
                  </label>
                </div>
              </div>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> <span data-key="save">Save</span>
              </button>

              <button type="button" id="resetBtn" class="btn btn-secondary">
                <i class="fas fa-rotate-left"></i> <span data-key="reset">Reset</span>
              </button>

              <button type="button" id="deleteBtn" class="btn btn-danger" style="display:none;">
                <i class="fas fa-trash"></i> <span data-key="delete">Delete</span>
              </button>
            </div>

            <div id="formMessage" class="message"></div>
          </form>
        </section>
      </div>
    </main>

    <footer><span data-key="footer">© 2025 AdvanceTeach — Admin Interface</span></footer>
  </div>
</div>

<script>
  let currentLang = localStorage.getItem('adminLang') || 'en';
  let currentPageSlug = 'home';
  let currentSection = null;
  let pagesCache = [];
  let sectionsCache = [];

  const translations = {
    en: {
      pageTitleTag: "Admin Sections - AdvanceTeach",
      dashboard: "Dashboard",
      quoteRequests: "Quote requests",
      offers: "Offers",
      services: "Services",
      projects: "Projects",
      pages: "Pages",
      sections: "Sections",
      media: "Media",
      logout: "Logout",
      langEn: "English",
      langFr: "French",
      sectionsTitle: "Sections management",
      sectionsSubtitle: "Add, edit, disable or remove internal sections of a page.",
      selectPage: "Select page",
      newSection: "New section",
      sectionsList: "Sections list",
      sectionForm: "Section editor",
      sectionKey: "Section key",
      sectionType: "Section type",
      titleEn: "Title EN",
      titleFr: "Title FR",
      contentEn: "Content EN",
      contentFr: "Content FR",
      buttonTextEn: "Button text EN",
      buttonTextFr: "Button text FR",
      imagePath: "Image path",
      buttonLink: "Button link",
      displayOrder: "Display order",
      status: "Status",
      active: "Active",
      save: "Save",
      reset: "Reset",
      delete: "Delete",
      footer: "© 2025 AdvanceTeach — Admin Interface",
      loading: "Loading...",
      noSections: "No sections found for this page.",
      createSuccess: "Section created successfully.",
      updateSuccess: "Section updated successfully.",
      deleteSuccess: "Section deleted successfully.",
      confirmDelete: "Do you really want to delete this section?",
      genericError: "Error",
      sessionExpired: "Session expired. Please log in again.",
      requiredPage: "Please select a page.",
      requiredSectionKey: "Section key is required.",
      typeLabel: "type:",
      orderLabel: "order:"
    },
    fr: {
      pageTitleTag: "Administration des sections - AdvanceTeach",
      dashboard: "Tableau de bord",
      quoteRequests: "Demandes de devis",
      offers: "Offres",
      services: "Services",
      projects: "Réalisations",
      pages: "Pages",
      sections: "Sections",
      media: "Médias",
      logout: "Déconnexion",
      langEn: "Anglais",
      langFr: "Français",
      sectionsTitle: "Gestion des sections",
      sectionsSubtitle: "Ajouter, modifier, désactiver ou supprimer les rubriques internes d'une page.",
      selectPage: "Sélectionner la page",
      newSection: "Nouvelle section",
      sectionsList: "Liste des sections",
      sectionForm: "Éditeur de section",
      sectionKey: "Clé de section",
      sectionType: "Type de section",
      titleEn: "Titre EN",
      titleFr: "Titre FR",
      contentEn: "Contenu EN",
      contentFr: "Contenu FR",
      buttonTextEn: "Texte bouton EN",
      buttonTextFr: "Texte bouton FR",
      imagePath: "Chemin image",
      buttonLink: "Lien bouton",
      displayOrder: "Ordre d'affichage",
      status: "Statut",
      active: "Actif",
      save: "Enregistrer",
      reset: "Réinitialiser",
      delete: "Supprimer",
      footer: "© 2025 AdvanceTeach — Interface Admin",
      loading: "Chargement...",
      noSections: "Aucune section trouvée pour cette page.",
      createSuccess: "Section créée avec succès.",
      updateSuccess: "Section mise à jour avec succès.",
      deleteSuccess: "Section supprimée avec succès.",
      confirmDelete: "Voulez-vous vraiment supprimer cette section ?",
      genericError: "Erreur",
      sessionExpired: "Session expirée. Veuillez vous reconnecter.",
      requiredPage: "Veuillez sélectionner une page.",
      requiredSectionKey: "La clé de section est obligatoire.",
      typeLabel: "type : ",
      orderLabel: "ordre : "
    }
  };

  function t(key) {
    return translations[currentLang][key] || key;
  }

  function updateUILanguage() {
    document.title = t('pageTitleTag');

    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (translations[currentLang][key]) {
        el.textContent = translations[currentLang][key];
      }
    });

    document.querySelectorAll('.lang-switch a').forEach(link => {
      link.classList.toggle('active', link.getAttribute('data-lang') === currentLang);
    });

    // Mise à jour des labels dynamiques dans la liste des sections
    if (sectionsCache.length) {
      renderSectionsList();
    }
  }

  function renderSectionsList() {
    const list = document.getElementById('sectionsList');
    list.innerHTML = '';

    if (!sectionsCache.length) {
      list.innerHTML = `<div class="section-item">${t('noSections')}</div>`;
      return;
    }

    sectionsCache.forEach(section => {
      const item = document.createElement('div');
      item.className = 'section-item';
      item.innerHTML = `
        <strong>${escapeHtml(section.section_key)}</strong>
        <small>${escapeHtml(section.title_en || '-')}</small>
        <small>${escapeHtml(section.title_fr || '-')}</small>
        <small>${t('typeLabel')} ${escapeHtml(section.section_type || '-')}</small>
        <small>${t('orderLabel')} ${section.display_order ?? 0}</small>
      `;

      item.addEventListener('click', () => {
        document.querySelectorAll('.section-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        fillForm(section);
      });

      list.appendChild(item);
    });
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function checkSession() {
    try {
      const response = await fetch('/api/admin/check', {
        credentials: 'same-origin'
      });
      const data = await response.json();

      if (!data.loggedIn) {
        window.location.href = 'admin-login.html';
        return false;
      }

      return true;
    } catch (error) {
      window.location.href = 'admin-login.html';
      return false;
    }
  }

  function showMessage(type, text) {
    const box = document.getElementById('formMessage');
    box.className = `message ${type}`;
    box.textContent = text;
  }

  function resetForm() {
    currentSection = null;
    document.getElementById('sectionId').value = '';
    document.getElementById('sectionKey').value = '';
    document.getElementById('sectionType').value = 'text';
    document.getElementById('titleEn').value = '';
    document.getElementById('titleFr').value = '';
    document.getElementById('contentEn').value = '';
    document.getElementById('contentFr').value = '';
    document.getElementById('buttonTextEn').value = '';
    document.getElementById('buttonTextFr').value = '';
    document.getElementById('imagePath').value = '';
    document.getElementById('buttonLink').value = '';
    document.getElementById('displayOrder').value = '0';
    document.getElementById('isActive').checked = true;
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('formMessage').className = 'message';
    document.getElementById('formMessage').textContent = '';
    document.querySelectorAll('.section-item').forEach(item => item.classList.remove('active'));
  }

  function fillForm(section) {
    currentSection = section;
    document.getElementById('sectionId').value = section.id;
    document.getElementById('sectionKey').value = section.section_key || '';
    document.getElementById('sectionType').value = section.section_type || 'text';
    document.getElementById('titleEn').value = section.title_en || '';
    document.getElementById('titleFr').value = section.title_fr || '';
    document.getElementById('contentEn').value = section.content_en || '';
    document.getElementById('contentFr').value = section.content_fr || '';
    document.getElementById('buttonTextEn').value = section.button_text_en || '';
    document.getElementById('buttonTextFr').value = section.button_text_fr || '';
    document.getElementById('imagePath').value = section.image_path || '';
    document.getElementById('buttonLink').value = section.button_link || '';
    document.getElementById('displayOrder').value = section.display_order ?? 0;
    document.getElementById('isActive').checked = !!section.is_active;
    document.getElementById('deleteBtn').style.display = 'inline-flex';
  }

  async function loadPages() {
    try {
      const response = await fetch('/api/admin/pages', {
        credentials: 'same-origin'
      });

      if (response.status === 401) {
        showMessage('error', t('sessionExpired'));
        return;
      }

      const data = await response.json();
      pagesCache = data.success ? data.data : [];

      const select = document.getElementById('pageSlugSelect');
      select.innerHTML = pagesCache.map(page => `
        <option value="${escapeHtml(page.slug)}">${escapeHtml(page.slug)} — ${escapeHtml(page.title_en || page.slug)}</option>
      `).join('');

      if (pagesCache.some(page => page.slug === currentPageSlug)) {
        select.value = currentPageSlug;
      } else if (pagesCache.length) {
        currentPageSlug = pagesCache[0].slug;
        select.value = currentPageSlug;
      }
    } catch (error) {
      console.error(error);
    }
  }

  async function loadSections() {
    const list = document.getElementById('sectionsList');
    list.innerHTML = `<div class="section-item">${t('loading')}</div>`;

    if (!currentPageSlug) {
      list.innerHTML = `<div class="section-item">${t('requiredPage')}</div>`;
      return;
    }

    try {
      const response = await fetch(`/api/admin/sections/${encodeURIComponent(currentPageSlug)}`, {
        credentials: 'same-origin'
      });

      if (response.status === 401) {
        showMessage('error', t('sessionExpired'));
        return;
      }

      const data = await response.json();
      sectionsCache = data.success ? data.data : [];

      renderSectionsList();
    } catch (error) {
      list.innerHTML = `<div class="section-item">${t('genericError')}</div>`;
    }
  }

  async function saveSection(e) {
    e.preventDefault();

    if (!currentPageSlug) {
      showMessage('error', t('requiredPage'));
      return;
    }

    const sectionId = document.getElementById('sectionId').value.trim();
    const sectionKey = document.getElementById('sectionKey').value.trim();

    if (!sectionKey) {
      showMessage('error', t('requiredSectionKey'));
      return;
    }

    const payload = {
      page_slug: currentPageSlug,
      section_key: sectionKey,
      section_type: document.getElementById('sectionType').value,
      title_en: document.getElementById('titleEn').value.trim(),
      title_fr: document.getElementById('titleFr').value.trim(),
      content_en: document.getElementById('contentEn').value.trim(),
      content_fr: document.getElementById('contentFr').value.trim(),
      button_text_en: document.getElementById('buttonTextEn').value.trim(),
      button_text_fr: document.getElementById('buttonTextFr').value.trim(),
      image_path: document.getElementById('imagePath').value.trim(),
      button_link: document.getElementById('buttonLink').value.trim(),
      display_order: parseInt(document.getElementById('displayOrder').value || '0', 10),
      is_active: document.getElementById('isActive').checked
    };

    const method = sectionId ? 'PATCH' : 'POST';
    const url = sectionId
      ? `/api/admin/sections/${sectionId}`
      : '/api/admin/sections';

    try {
      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.message || t('genericError'));
      }

      showMessage('success', sectionId ? t('updateSuccess') : t('createSuccess'));
      await loadSections();

      if (!sectionId && data.data) {
        fillForm(data.data);
      }
    } catch (error) {
      showMessage('error', error.message);
    }
  }

  async function deleteSection() {
    const sectionId = document.getElementById('sectionId').value.trim();
    if (!sectionId) return;

    if (!confirm(t('confirmDelete'))) return;

    try {
      const response = await fetch(`/api/admin/sections/${sectionId}`, {
        method: 'DELETE',
        credentials: 'same-origin'
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.message || t('genericError'));
      }

      showMessage('success', t('deleteSuccess'));
      resetForm();
      await loadSections();
    } catch (error) {
      showMessage('error', error.message);
    }
  }

  document.querySelectorAll('.lang-switch a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      currentLang = link.getAttribute('data-lang');
      localStorage.setItem('adminLang', currentLang);
      updateUILanguage();
      loadSections();
    });
  });

  document.getElementById('pageSlugSelect').addEventListener('change', async (e) => {
    currentPageSlug = e.target.value;
    resetForm();
    await loadSections();
  });

  document.getElementById('newSectionBtn').addEventListener('click', () => {
    resetForm();
    document.getElementById('displayOrder').value = sectionsCache.length + 1;
  });

  document.getElementById('sectionForm').addEventListener('submit', saveSection);
  document.getElementById('resetBtn').addEventListener('click', resetForm);
  document.getElementById('deleteBtn').addEventListener('click', deleteSection);

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await fetch('/api/admin/logout', {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (error) {
    } finally {
      window.location.href = 'admin-login.html';
    }
  });

  (async function init() {
    updateUILanguage();
    const ok = await checkSession();
    if (ok) {
      await loadPages();
      resetForm();
      await loadSections();
    }
  })();
</script>
</body>
</html>

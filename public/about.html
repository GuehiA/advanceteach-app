<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AdvanceTeach | About</title>
  <meta name="description" content="About AdvanceTeach" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Assure que le footer reste en bas */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .page-content {
      flex: 1;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="page-content">
    <!-- HERO (depuis pages) -->
    <section class="hero">
      <div class="hero-container">
        <div class="hero-text">
          <h1 id="pageTitle">Loading...</h1>
          <p id="pageContent">Loading...</p>
          <div class="hero-buttons">
            <a href="devis.html" class="btn btn-primary">
              <i class="fas fa-file-invoice-dollar"></i>
              <span data-key="quoteBtn">Request a quote</span>
            </a>
            <a href="contact.html" class="btn btn-secondary">
              <i class="fas fa-headset"></i>
              <span data-key="contactBtn">Contact us</span>
            </a>
          </div>
        </div>
        <div class="hero-image">
          <img id="heroImage" src="images/about-advanceteach.jpg" alt="About AdvanceTeach" class="hero-logo" onerror="this.src='https://placehold.co/520x340?text=About+AdvanceTeach'">
        </div>
      </div>
    </section>

    <!-- SECTIONS DYNAMIQUES (depuis /api/sections/about) -->
    <div id="dynamicSections"></div>
  </div>

  <div id="site-footer"></div>

  <script src="/js/layout.js"></script>
  <script>
    // Traductions COMPLÈTES
    const translations = {
      en: {
        home: "Home",
        about: "About",
        services: "Services",
        projects: "Projects",
        trainings: "Trainings",
        research: "Research",
        offers: "Offers",
        quote: "Quote",
        contact: "Contact",
        pageTitleTag: "AdvanceTeach | About",
        quoteBtn: "Request a quote",
        contactBtn: "Contact us",
        footer: "© 2025 AdvanceTeach — Artificial intelligence, smart platforms and training.",
        loading: "Loading...",
        errorTitle: "Unable to load content",
        errorText: "Please try again later.",
        defaultHeroTitle: "About AdvanceTeach",
        defaultHeroText: "AdvanceTeach supports organizations with AI consulting, smart platforms and professional training."
      },
      fr: {
        home: "Accueil",
        about: "À propos",
        services: "Services",
        projects: "Réalisations",
        trainings: "Formations",
        research: "Recherche",
        offers: "Offres",
        quote: "Devis",
        contact: "Contact",
        pageTitleTag: "AdvanceTeach | À propos",
        quoteBtn: "Demander un devis",
        contactBtn: "Nous contacter",
        footer: "© 2025 AdvanceTeach — Intelligence artificielle, plateformes intelligentes et formation.",
        loading: "Chargement...",
        errorTitle: "Impossible de charger le contenu",
        errorText: "Veuillez réessayer plus tard.",
        defaultHeroTitle: "À propos d'AdvanceTeach",
        defaultHeroText: "AdvanceTeach accompagne les organisations en conseil IA, plateformes intelligentes et formation professionnelle."
      }
    };

    let currentLang = 'en';
    let currentSections = [];

    function t(key) {
      return translations[currentLang][key] || key;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;'
      }[char]));
    }

    function escapeAttribute(text) {
      return escapeHtml(text).replace(/'/g, '&#39;');
    }

    // Charge le hero
    async function loadAboutPage() {
      try {
        const response = await fetch(`/api/pages/about?lang=${currentLang}`);
        const result = await response.json();

        if (response.ok && result.success && result.data) {
          const page = result.data;
          document.getElementById('pageTitle').textContent = page.title || t('defaultHeroTitle');
          document.getElementById('pageContent').textContent = page.content || t('defaultHeroText');
          document.title = page.meta_title || t('pageTitleTag');

          let meta = document.querySelector('meta[name="description"]');
          if (!meta) {
            meta = document.createElement('meta');
            meta.setAttribute('name', 'description');
            document.head.appendChild(meta);
          }
          meta.setAttribute('content', page.meta_description || t('defaultHeroText'));

          if (page.hero_image) {
            document.getElementById('heroImage').src = page.hero_image;
          }
        } else {
          document.getElementById('pageTitle').textContent = t('defaultHeroTitle');
          document.getElementById('pageContent').textContent = t('defaultHeroText');
          document.title = t('pageTitleTag');
        }
      } catch (error) {
        console.error("Error loading page:", error);
        document.getElementById('pageTitle').textContent = t('defaultHeroTitle');
        document.getElementById('pageContent').textContent = t('defaultHeroText');
        document.title = t('pageTitleTag');
      }
    }

    // Charge les sections dynamiques
    async function loadAboutSections() {
      try {
        const response = await fetch(`/api/sections/about?lang=${currentLang}`);
        const result = await response.json();

        if (response.ok && result.success && Array.isArray(result.data)) {
          currentSections = result.data;
        } else {
          currentSections = [];
        }
      } catch (error) {
        console.error("Error loading sections:", error);
        currentSections = [];
      }
    }

    // Affiche les sections dynamiquement
    function renderDynamicSections() {
      const container = document.getElementById('dynamicSections');
      if (!container) return;

      if (!currentSections.length) {
        container.innerHTML = `
          <section class="home-intro">
            <div class="section-container">
              <p>${t('loading')}</p>
            </div>
          </section>
        `;
        return;
      }

      container.innerHTML = currentSections.map(section => {
        const title = escapeHtml(section.title || '');
        const content = escapeHtml(section.content || '');
        const buttonText = escapeHtml(section.button_text || '');
        const buttonLink = escapeAttribute(section.button_link || 'contact.html');

        // Section "mission" (3 cartes)
        if (section.section_key === 'mission') {
          return `
            <section class="home-intro">
              <div class="section-container">
                <h2>${title}</h2>
                <div class="cards">
                  ${content.split('|||').map((card, index) => {
                    const [cardTitle, cardDesc] = card.split(':::');
                    const icons = ['fa-brain', 'fa-graduation-cap', 'fa-people-group'];
                    return `
                      <div class="card">
                        <i class="fas ${icons[index] || 'fa-cogs'}"></i>
                        <h3>${escapeHtml(cardTitle || '')}</h3>
                        <p>${escapeHtml(cardDesc || '')}</p>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            </section>
          `;
        }

        // Section CTA
        if (section.section_type === 'cta') {
          return `
            <section class="home-intro">
              <div class="section-container cta-block">
                <h2>${title}</h2>
                <p>${content}</p>
                <div class="hero-buttons" style="justify-content: center;">
                  <a href="${buttonLink}" class="btn btn-primary">
                    <i class="fas fa-file-signature"></i>
                    <span>${buttonText || t('quoteBtn')}</span>
                  </a>
                </div>
              </div>
            </section>
          `;
        }

        // Section par défaut (texte simple)
        return `
          <section class="home-intro">
            <div class="section-container">
              <h2>${title}</h2>
              <p>${content}</p>
            </div>
          </section>
        `;
      }).join('');
    }

    // Rafraîchit la page
    async function refreshPage(lang) {
      currentLang = lang;
      document.documentElement.lang = currentLang;

      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });

      await Promise.all([
        loadAboutPage(),
        loadAboutSections()
      ]);

      renderDynamicSections();
    }

    // Initialisation
    (async function init() {
      if (typeof initGlobalLayout === 'function') {
        currentLang = await initGlobalLayout(translations, refreshPage);
      }
      await refreshPage(currentLang);
    })();
  </script>
</body>
</html>

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>AdvanceTeach | About</title>

  <meta
    name="description"
    content="About AdvanceTeach"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"

  <link

    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .page-content {
      flex: 1;
    }

    .about-text-section {

    .about-mission-section .cards {

    .about-cta-section {
      padding: 3rem 0;

    .about-cta-section .cta-block {
      text-align: center;
    }

    .about-cta-section .cta-block h2 {
      margin-bottom: 1rem;
    }

    .about-cta-section .cta-block p {
      color: #3a4b6e;

      margin-bottom: 1.5rem;
      white-space: pre-line;
    }

    @media (max-width: 768px) {
      .about-mission-section .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <div class="page-content">

    <!-- HERO -->
    <section class="hero">
      <div class="hero-container">

        <div class="hero-text">
          <h1 id="pageTitle">
            Loading...
          </h1>

          <p id="pageContent">
            Loading...
          </p>

          <div class="hero-buttons">

            <a
              href="devis.html"
              class="btn btn-primary"
            >
              <i class="fas fa-file-invoice-dollar"></i>

              <span data-key="quoteBtn">
                Request a quote
              </span>
            </a>

            <a
              href="contact.html"
              class="btn btn-secondary"
            >
              <i class="fas fa-headset"></i>

              <span data-key="contactBtn">
                Contact us
              </span>
            </a>

          </div>
        </div>

        <div class="hero-image">
          <img
            id="heroImage"
            src="images/about-advanceteach.jpg"
            alt="About AdvanceTeach"
            class="hero-logo"
            onerror="this.onerror=null; this.src='https://placehold.co/520x340?text=About+AdvanceTeach';"
          >
        </div>

      </div>
    </section>

    <!-- SECTIONS DYNAMIQUES -->
    <div id="dynamicSections"></div>

  </div>

  <div id="site-footer"></div>

  <script src="/js/layout.js"></script>

  <script>
    const translations = {
      en: {
        home: "Home",
        about: "About",
        services: "Services",
        projects: "Projects",
        trainings: "Trainings",
        research: "Research",
        offers: "Offers",
        quote: "Quote",
        contact: "Contact",

        pageTitleTag: "AdvanceTeach | About",

        quoteBtn: "Request a quote",
        contactBtn: "Contact us",

        footer:
          "© 2025 AdvanceTeach — Artificial intelligence, smart platforms and training.",

        loading: "Loading...",

        errorTitle: "Unable to load content",
        errorText: "Please try again later.",

        defaultHeroTitle:
          "About AdvanceTeach",

        defaultHeroText:
          "AdvanceTeach supports organizations with AI consulting, smart platforms and professional training."
      },

      fr: {
        home: "Accueil",
        about: "À propos",
        services: "Services",
        projects: "Réalisations",
        trainings: "Formations",
        research: "Recherche",
        offers: "Offres",
        quote: "Devis",
        contact: "Contact",

        pageTitleTag: "AdvanceTeach | À propos",

        quoteBtn: "Demander un devis",
        contactBtn: "Nous contacter",

        footer:
          "© 2025 AdvanceTeach — Intelligence artificielle, plateformes intelligentes et formation.",

        loading: "Chargement...",

        errorTitle: "Impossible de charger le contenu",
        errorText: "Veuillez réessayer plus tard.",

        defaultHeroTitle:
          "À propos d’AdvanceTeach",

        defaultHeroText:
          "AdvanceTeach accompagne les organisations en conseil en intelligence artificielle, plateformes intelligentes et formation professionnelle."
      }
    };

    let currentLang = "en";
    let currentSections = [];

    function t(key) {
      return translations[currentLang]?.[key] || key;
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) {
        return "";
      }

      return String(value).replace(
        /[&<>"']/g,
        character => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[character])
      );
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    function setDefaultHeroContent() {
      document.getElementById("pageTitle").textContent =
        t("defaultHeroTitle");

      document.getElementById("pageContent").textContent =
        t("defaultHeroText");

      document.title =
        t("pageTitleTag");

      const metaDescription = document.querySelector(
        'meta[name="description"]'
      );

      if (metaDescription) {
        metaDescription.setAttribute(
          "content",
          t("defaultHeroText")
        );
      }
    }

    async function loadAboutPage() {
      try {
        const response = await fetch(
          `/api/pages/about?lang=${encodeURIComponent(currentLang)}`
        );

        if (!response.ok) {
          throw new Error(
            `Unable to load About page: HTTP ${response.status}`
          );
        }

        const result = await response.json();

        if (
          !result.success ||
          !result.data
        ) {
          setDefaultHeroContent();
          return;
        }

        const page = result.data;

        document.getElementById("pageTitle").textContent =
          page.title ||
          t("defaultHeroTitle");

        document.getElementById("pageContent").textContent =
          page.content ||
          t("defaultHeroText");

        document.title =
          page.meta_title ||
          t("pageTitleTag");

        let metaDescription = document.querySelector(
          'meta[name="description"]'
        );

        if (!metaDescription) {
          metaDescription =
            document.createElement("meta");

          metaDescription.setAttribute(
            "name",
            "description"
          );

          document.head.appendChild(
            metaDescription
          );
        }

        metaDescription.setAttribute(
          "content",
          page.meta_description ||
          page.content ||
          t("defaultHeroText")
        );

        if (page.hero_image) {
          document.getElementById(
            "heroImage"
          ).src = page.hero_image;
        }

      } catch (error) {
        console.error(
          "Error loading About page:",
          error
        );

        setDefaultHeroContent();
      }
    }

    async function loadAboutSections() {
      try {
        const response = await fetch(
          `/api/sections/about?lang=${encodeURIComponent(currentLang)}`
        );

        if (!response.ok) {
          throw new Error(
            `Unable to load About sections: HTTP ${response.status}`
          );
        }

        const result = await response.json();

        if (
          result.success &&
          Array.isArray(result.data)
        ) {
          currentSections =
            result.data.filter(
              section =>
                section &&
                section.is_active !== false
            );
        } else {
          currentSections = [];
        }

      } catch (error) {
        console.error(
          "Error loading About sections:",
          error
        );

        currentSections = [];
      }
    }

    function renderMissionSection(section) {
      const sectionTitle =
        escapeHtml(section.title || "");

      const rawContent =
        String(section.content || "");

      const cards = rawContent
        .split("|||")
        .map(card => card.trim())
        .filter(Boolean);

      if (!cards.length) {
        return "";
      }

      const icons = [
        "fa-brain",
        "fa-graduation-cap",
        "fa-people-group",
        "fa-lightbulb",
        "fa-shield-halved",
        "fa-chart-line"
      ];

      const cardsHtml = cards.map(
        (card, index) => {
          const parts =
            card.split(":::");

          const cardTitle =
            parts.shift()?.trim() || "";

          const cardDescription =
            parts.join(":::").trim();

          return `
            <div class="card">
              <i class="fas ${icons[index] || "fa-cogs"}"></i>

              ${
                cardTitle
                  ? `<h3>${escapeHtml(cardTitle)}</h3>`
                  : ""
              }

              ${
                cardDescription
                  ? `<p>${escapeHtml(cardDescription)}</p>`
                  : ""
              }
            </div>
          `;
        }
      ).join("");

      return `
        <section class="about-mission-section">
          <div class="section-container">

            ${
              sectionTitle
                ? `<h2>${sectionTitle}</h2>`
                : ""
            }

            <div class="cards">
              ${cardsHtml}
            </div>

          </div>
        </section>
      `;
    }

    function renderCtaSection(section) {
      const title =
        escapeHtml(section.title || "");

      const content =
        escapeHtml(section.content || "");

      const buttonText =
        escapeHtml(
          section.button_text ||
          t("quoteBtn")
        );

      const buttonLink =
        escapeAttribute(
          section.button_link ||
          "devis.html"
        );

      return `
        <section class="about-cta-section">
          <div class="section-container cta-block">

            ${
              title
                ? `<h2>${title}</h2>`
                : ""
            }

            ${
              content
                ? `<p>${content}</p>`
                : ""
            }

            <div
              class="hero-buttons"
              style="justify-content:center;"
            >
              <a
                href="${buttonLink}"
                class="btn btn-primary"
              >
                <i class="fas fa-file-signature"></i>

                <span>
                  ${buttonText}
                </span>
              </a>
            </div>

          </div>
        </section>
      `;
    }

    function renderTextSection(section) {
      const title =
        escapeHtml(section.title || "");

      const content =
        escapeHtml(section.content || "");

      if (!title && !content) {
        return "";
      }

      return `
        <section class="about-text-section">
          <div class="section-container">

            ${
              title
                ? `<h2>${title}</h2>`
                : ""
            }

            ${
              content
                ? `<p>${content}</p>`
                : ""
            }

          </div>
        </section>
      `;
    }

    function renderDynamicSections() {
      const container =
        document.getElementById(
          "dynamicSections"
        );

      if (!container) {
        return;
      }

      if (
        !Array.isArray(currentSections) ||
        currentSections.length === 0
      ) {
        container.innerHTML = "";
        return;
      }

      const sectionsHtml =
        currentSections
          .sort(
            (sectionA, sectionB) =>
              Number(
                sectionA.display_order ??
                sectionA.order ??
                sectionA.ordre ??
                0
              ) -
              Number(
                sectionB.display_order ??
                sectionB.order ??
                sectionB.ordre ??
                0
              )
          )
          .map(section => {
            if (
              section.section_key ===
              "mission"
            ) {
              return renderMissionSection(
                section
              );
            }

            if (
              section.section_type ===
              "cta"
            ) {
              return renderCtaSection(
                section
              );
            }

            return renderTextSection(
              section
            );
          })
          .join("");

      container.innerHTML =
        sectionsHtml;
    }

    function updateStaticTranslations() {
      document
        .querySelectorAll("[data-key]")
        .forEach(element => {
          const key =
            element.getAttribute(
              "data-key"
            );

          if (
            translations[currentLang]?.[key]
          ) {
            element.textContent =
              translations[currentLang][key];
          }
        });
    }

    async function refreshPage(lang) {
      currentLang =
        lang === "fr"
          ? "fr"
          : "en";

      document.documentElement.lang =
        currentLang;

      updateStaticTranslations();

      await Promise.all([
        loadAboutPage(),
        loadAboutSections()
      ]);

      renderDynamicSections();
    }

    async function initializePage() {
      try {
        if (
          typeof initGlobalLayout ===
          "function"
        ) {
          const selectedLanguage =
            await initGlobalLayout(
              translations,
              refreshPage
            );

          currentLang =
            selectedLanguage === "fr"
              ? "fr"
              : "en";
        } else {
          currentLang =
            localStorage.getItem(
              "siteLang"
            ) === "fr"
              ? "fr"
              : "en";
        }

        await refreshPage(
          currentLang
        );

      } catch (error) {
        console.error(
          "Error initializing About page:",
          error
        );

        currentLang = "en";

        updateStaticTranslations();
        setDefaultHeroContent();

        currentSections = [];
        renderDynamicSections();
      }
    }

    initializePage();
  </script>

</body>
</html>

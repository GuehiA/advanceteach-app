<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title id="pageTitle">Admin Offers - AdvanceTeach</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4f46e5;
      --primary-dark: #3b30b0;
      --primary-light: #eef2ff;
      --text: #0f172a;
      --text-light: #334155;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 24px;
      --radius-md: 16px;
      --danger: #dc2626;
      --success: #059669;
      --sidebar-width: 260px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(125deg, #f1f5f9 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(79,70,229,0.12);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header { padding: 1.5rem 1.2rem; border-bottom: 1px solid var(--border); }
    .logo-brand { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
    .logo-img { height: 40px; width: auto; }
    .brand-text {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0f172a 0%, var(--primary) 80%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .brand-text span { color: var(--primary); background: none; }

    .admin-nav {
      flex: 1;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .admin-nav a {
      text-decoration: none;
      font-weight: 500;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      margin: 0 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .admin-nav a i { width: 24px; color: var(--text-muted); }
    .admin-nav a:hover, .admin-nav a.active {
      background: var(--primary-light);
      color: var(--primary);
    }
    .admin-nav a:hover i, .admin-nav a.active i { color: var(--primary); }

    .main-content { flex: 1; display: flex; flex-direction: column; }
    .top-bar {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79,70,229,0.12);
      padding: 0.85rem 2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .lang-switch {
      background: #f0f3fe;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      display: inline-flex;
      gap: 8px;
    }
    .lang-switch a { text-decoration: none; color: #1e293b; padding: 0 4px; }
    .lang-switch a.active { color: var(--primary); font-weight: 700; }

    .logout-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .page-wrap { padding: 2rem; }
    .page-title { margin-bottom: 1.5rem; }
    .page-title h1 { font-size: 1.8rem; margin-bottom: 0.4rem; }
    .page-title p { color: var(--text-light); }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
    }

    .card h2 { margin-bottom: 1rem; font-size: 1.2rem; }

    .offers-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 70vh;
      overflow: auto;
    }

    .offer-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }
    .offer-item:hover, .offer-item.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .offer-item strong { display: block; margin-bottom: 4px; }
    .offer-item small { color: var(--text-muted); display: block; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .full { grid-column: 1 / -1; }

    .lang-box {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fafbff;
    }

    .lang-box h3 {
      margin-bottom: 12px;
      font-size: 1rem;
      color: var(--primary);
    }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
      background: white;
    }
    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .checkbox-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .checkbox-row label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      cursor: pointer;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-danger { background: #fee2e2; color: #b91c1c; }

    .message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
    }
    .message.success {
      display: block;
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }
    .message.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    footer {
      background: #0f172a;
      color: #94a3b8;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      margin-top: auto;
    }

    @media (max-width: 980px) {
      .content-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .admin-nav { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .admin-nav a { padding: 8px 16px; }
      .top-bar { justify-content: center; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="logo-brand">
        <img src="images/logo-advanceteach.png" alt="AdvanceTeach" class="logo-img" onerror="this.src='https://placehold.co/200x60?text=AT'">
        <div class="brand-text">Advance<span>Teach</span></div>
      </a>
    </div>

    <nav class="admin-nav">
      <a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> <span data-key="dashboard">Dashboard</span></a>
      <a href="admin-demandes.html"><i class="fas fa-inbox"></i> <span data-key="requests">Demandes</span></a>
      <a href="admin-offres.html" class="active"><i class="fas fa-tags"></i> <span data-key="offers">Offres</span></a>
      <a href="admin-services.html"><i class="fas fa-cogs"></i> <span data-key="services">Services</span></a>
      <a href="admin-projets.html"><i class="fas fa-rocket"></i> <span data-key="projects">Réalisations</span></a>
      <a href="admin-pages.html"><i class="fas fa-file-alt"></i> <span data-key="pages">Pages</span></a>
      <a href="admin-sections.html"><i class="fas fa-layer-group"></i> <span data-key="sections">Sections</span></a>
      <a href="admin-media.html"><i class="fas fa-images"></i> <span data-key="media">Médias</span></a>
    </nav>
  </aside>

  <div class="main-content">
    <div class="top-bar">
      <div class="lang-switch">
        <a href="#" data-lang="en" class="lang-en active">🇬🇧 <span data-key="langEn">English</span></a> |
        <a href="#" data-lang="fr" class="lang-fr">🇫🇷 <span data-key="langFr">Français</span></a>
      </div>
      <button id="logoutBtn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> <span data-key="logout">Logout</span>
      </button>
    </div>

    <main class="page-wrap">
      <div class="page-title">
        <h1 data-key="offersTitle">Offers management</h1>
        <p data-key="offersSubtitle">Create, edit and publish bilingual offers.</p>
      </div>

      <div class="content-grid">
        <section class="card">
          <h2 data-key="offersList">Offers list</h2>
          <div id="offersList" class="offers-list"></div>
        </section>

        <section class="card">
          <h2 data-key="offerForm">Offer form</h2>

          <form id="offerForm">
            <input type="hidden" id="offerId">

            <div class="form-grid">
              <div class="lang-box">
                <h3 data-key="langEn">English</h3>

                <div class="form-group">
                  <label data-key="titleEn">Title EN</label>
                  <input type="text" id="titleEn" required>
                </div>

                <div class="form-group">
                  <label data-key="shortDescEn">Short description EN</label>
                  <textarea id="shortDescEn"></textarea>
                </div>

                <div class="form-group">
                  <label data-key="fullDescEn">Full description EN</label>
                  <textarea id="fullDescEn"></textarea>
                </div>
              </div>

              <div class="lang-box">
                <h3 data-key="langFr">Français</h3>

                <div class="form-group">
                  <label data-key="titleFr">Titre FR</label>
                  <input type="text" id="titleFr" required>
                </div>

                <div class="form-group">
                  <label data-key="shortDescFr">Description courte FR</label>
                  <textarea id="shortDescFr"></textarea>
                </div>

                <div class="form-group">
                  <label data-key="fullDescFr">Description longue FR</label>
                  <textarea id="fullDescFr"></textarea>
                </div>
              </div>

              <div class="form-group">
                <label data-key="imagePath">Image path</label>
                <input type="text" id="imagePath" placeholder="/uploads/offer.jpg">
              </div>

              <div class="form-group">
                <label data-key="documentPath">Document path</label>
                <input type="text" id="documentPath" placeholder="/documents/brochure.pdf">
              </div>

              <div class="form-group">
                <label data-key="status">Status</label>
                <select id="status">
                  <option value="draft">draft</option>
                  <option value="published">published</option>
                  <option value="archived">archived</option>
                </select>
              </div>

              <div class="form-group">
                <label data-key="publishedAt">Published at</label>
                <input type="datetime-local" id="publishedAt">
              </div>

              <div class="form-group">
                <label data-key="expiresAt">Expires at</label>
                <input type="datetime-local" id="expiresAt">
              </div>

              <div class="form-group">
                <label data-key="options">Options</label>
                <div class="checkbox-row">
                  <label><input type="checkbox" id="isFeatured"> <span data-key="featured">Featured</span></label>
                </div>
              </div>
            </div>

            <div class="actions">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> <span data-key="save">Save</span>
              </button>

              <button type="button" id="resetBtn" class="btn btn-secondary">
                <i class="fas fa-rotate-left"></i> <span data-key="reset">Reset</span>
              </button>

              <button type="button" id="deleteBtn" class="btn btn-danger" style="display:none;">
                <i class="fas fa-trash"></i> <span data-key="delete">Delete</span>
              </button>
            </div>

            <div id="formMessage" class="message"></div>
          </form>
        </section>
      </div>
    </main>

    <footer><span data-key="footer">© 2025 AdvanceTeach — Admin Interface</span></footer>
  </div>
</div>

<script>
  let currentLang = localStorage.getItem('adminLang') || 'en';
  let currentOffer = null;

  const translations = {
    en: {
      pageTitle: "Admin Offers - AdvanceTeach",
      langEn: "English",
      langFr: "Français",
      dashboard: "Dashboard",
      requests: "Requests",
      offers: "Offers",
      services: "Services",
      projects: "Projects",
      pages: "Pages",
      media: "Media",
      logout: "Logout",
      offersTitle: "Offers management",
      offersSubtitle: "Create, edit and publish bilingual offers.",
      offersList: "Offers list",
      offerForm: "Offer form",
      titleEn: "Title EN",
      titleFr: "Title FR",
      shortDescEn: "Short description EN",
      shortDescFr: "Short description FR",
      fullDescEn: "Full description EN",
      fullDescFr: "Full description FR",
      imagePath: "Image path",
      documentPath: "Document path",
      status: "Status",
      statusLabel: "Status",
      statusDraft: "Draft",
      statusPublished: "Published",
      statusArchived: "Archived",
      publishedAt: "Published at",
      expiresAt: "Expires at",
      options: "Options",
      featured: "Featured",
      save: "Save",
      reset: "Reset",
      delete: "Delete",
      footer: "© 2025 AdvanceTeach — Admin Interface",
      loading: "Loading...",
      noOffers: "No offers found.",
      createSuccess: "Offer created successfully.",
      updateSuccess: "Offer updated successfully.",
      deleteSuccess: "Offer deleted successfully.",
      confirmDelete: "Do you really want to delete this offer?",
      sessionExpired: "Session expired. Please log in again.",
      genericError: "Error"
    },
    fr: {
      pageTitle: "Administration des offres - AdvanceTeach",
      langEn: "Anglais",
      langFr: "Français",
      dashboard: "Tableau de bord",
      requests: "Demandes",
      offers: "Offres",
      services: "Services",
      projects: "Réalisations",
      pages: "Pages",
      media: "Médias",
      logout: "Déconnexion",
      offersTitle: "Gestion des offres",
      offersSubtitle: "Créer, modifier et publier des offres bilingues.",
      offersList: "Liste des offres",
      offerForm: "Formulaire d'offre",
      titleEn: "Titre EN",
      titleFr: "Titre FR",
      shortDescEn: "Description courte EN",
      shortDescFr: "Description courte FR",
      fullDescEn: "Description longue EN",
      fullDescFr: "Description longue FR",
      imagePath: "Chemin image",
      documentPath: "Chemin document",
      status: "Statut",
      statusLabel: "Statut",
      statusDraft: "Brouillon",
      statusPublished: "Publié",
      statusArchived: "Archivé",
      publishedAt: "Publié le",
      expiresAt: "Expire le",
      options: "Options",
      featured: "Mise en avant",
      save: "Enregistrer",
      reset: "Réinitialiser",
      delete: "Supprimer",
      footer: "© 2025 AdvanceTeach — Interface Admin",
      loading: "Chargement...",
      noOffers: "Aucune offre trouvée.",
      createSuccess: "Offre créée avec succès.",
      updateSuccess: "Offre modifiée avec succès.",
      deleteSuccess: "Offre supprimée avec succès.",
      confirmDelete: "Voulez-vous vraiment supprimer cette offre ?",
      sessionExpired: "Session expirée. Veuillez vous reconnecter.",
      genericError: "Erreur"
    }
  };

  function t(key) {
    return translations[currentLang][key] || key;
  }

  function translateStatus(status) {
    if (status === 'draft') return t('statusDraft');
    if (status === 'published') return t('statusPublished');
    if (status === 'archived') return t('statusArchived');
    return status || '-';
  }

  function updateUILanguage() {
    // Update page title
    document.title = t('pageTitle');
    
    // Update all elements with data-key attribute
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (translations[currentLang][key]) {
        el.textContent = translations[currentLang][key];
      }
    });

    // Update language switch active state
    document.querySelectorAll('.lang-switch a').forEach(link => {
      link.classList.toggle('active', link.getAttribute('data-lang') === currentLang);
    });

    // Update status select options
    const statusSelect = document.getElementById('status');
    if (statusSelect) {
      statusSelect.options[0].text = t('statusDraft');
      statusSelect.options[1].text = t('statusPublished');
      statusSelect.options[2].text = t('statusArchived');
    }
  }

  async function checkSession() {
    try {
      const response = await fetch('/api/admin/check', {
        credentials: 'same-origin'
      });
      const data = await response.json();

      if (!data.loggedIn) {
        window.location.href = 'admin-login.html';
        return false;
      }

      return true;
    } catch (error) {
      window.location.href = 'admin-login.html';
      return false;
    }
  }

  function showMessage(type, text) {
    const box = document.getElementById('formMessage');
    box.className = `message ${type}`;
    box.textContent = text;
  }

  function resetForm() {
    currentOffer = null;
    document.getElementById('offerId').value = '';
    document.getElementById('titleEn').value = '';
    document.getElementById('titleFr').value = '';
    document.getElementById('shortDescEn').value = '';
    document.getElementById('shortDescFr').value = '';
    document.getElementById('fullDescEn').value = '';
    document.getElementById('fullDescFr').value = '';
    document.getElementById('imagePath').value = '';
    document.getElementById('documentPath').value = '';
    document.getElementById('status').value = 'draft';
    document.getElementById('publishedAt').value = '';
    document.getElementById('expiresAt').value = '';
    document.getElementById('isFeatured').checked = false;
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('formMessage').className = 'message';
    document.getElementById('formMessage').textContent = '';
    document.querySelectorAll('.offer-item').forEach(item => item.classList.remove('active'));
  }

  function toDatetimeLocal(value) {
    if (!value) return '';
    const d = new Date(value);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function fillForm(offer) {
    currentOffer = offer;
    document.getElementById('offerId').value = offer.id;
    document.getElementById('titleEn').value = offer.title_en || '';
    document.getElementById('titleFr').value = offer.title_fr || '';
    document.getElementById('shortDescEn').value = offer.short_desc_en || '';
    document.getElementById('shortDescFr').value = offer.short_desc_fr || '';
    document.getElementById('fullDescEn').value = offer.full_desc_en || '';
    document.getElementById('fullDescFr').value = offer.full_desc_fr || '';
    document.getElementById('imagePath').value = offer.image_path || '';
    document.getElementById('documentPath').value = offer.document_path || '';
    document.getElementById('status').value = offer.status || 'draft';
    document.getElementById('publishedAt').value = toDatetimeLocal(offer.published_at);
    document.getElementById('expiresAt').value = toDatetimeLocal(offer.expires_at);
    document.getElementById('isFeatured').checked = !!offer.is_featured;
    document.getElementById('deleteBtn').style.display = 'inline-flex';
  }

  async function loadOffers() {
    const list = document.getElementById('offersList');
    list.innerHTML = `<div class="offer-item">${t('loading')}</div>`;

    try {
      const response = await fetch('/api/admin/offres', {
        credentials: 'same-origin'
      });

      if (response.status === 401) {
        showMessage('error', t('sessionExpired'));
        setTimeout(() => window.location.href = 'admin-login.html', 800);
        return;
      }

      const data = await response.json();

      if (!data.success || !data.data.length) {
        list.innerHTML = `<div class="offer-item">${t('noOffers')}</div>`;
        return;
      }

      list.innerHTML = '';

      data.data.forEach(offer => {
        const item = document.createElement('div');
        item.className = 'offer-item';
        item.innerHTML = `
          <strong>${escapeHtml(offer.title_en) || '-'}</strong>
          <small>${escapeHtml(offer.title_fr) || '-'}</small>
          <small>${t('statusLabel')}: ${translateStatus(offer.status)}</small>
        `;

        item.addEventListener('click', () => {
          document.querySelectorAll('.offer-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          fillForm(offer);
        });

        list.appendChild(item);
      });
    } catch (error) {
      list.innerHTML = `<div class="offer-item">${t('genericError')}</div>`;
    }
  }

  async function saveOffer(e) {
    e.preventDefault();

    const id = document.getElementById('offerId').value.trim();
    const payload = {
      title_en: document.getElementById('titleEn').value.trim(),
      title_fr: document.getElementById('titleFr').value.trim(),
      short_desc_en: document.getElementById('shortDescEn').value.trim(),
      short_desc_fr: document.getElementById('shortDescFr').value.trim(),
      full_desc_en: document.getElementById('fullDescEn').value.trim(),
      full_desc_fr: document.getElementById('fullDescFr').value.trim(),
      image_path: document.getElementById('imagePath').value.trim(),
      document_path: document.getElementById('documentPath').value.trim(),
      status: document.getElementById('status').value,
      published_at: document.getElementById('publishedAt').value || null,
      expires_at: document.getElementById('expiresAt').value || null,
      is_featured: document.getElementById('isFeatured').checked
    };

    const method = id ? 'PATCH' : 'POST';
    const url = id ? `/api/admin/offres/${id}` : '/api/admin/offres';

    try {
      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.message || t('genericError'));
      }

      showMessage('success', id ? t('updateSuccess') : t('createSuccess'));
      await loadOffers();

      if (!id && data.data) {
        fillForm(data.data);
      }
    } catch (error) {
      showMessage('error', error.message);
    }
  }

  async function deleteOffer() {
    const id = document.getElementById('offerId').value.trim();
    if (!id) return;

    if (!confirm(t('confirmDelete'))) return;

    try {
      const response = await fetch(`/api/admin/offres/${id}`, {
        method: 'DELETE',
        credentials: 'same-origin'
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.message || t('genericError'));
      }

      showMessage('success', t('deleteSuccess'));
      resetForm();
      await loadOffers();
    } catch (error) {
      showMessage('error', error.message);
    }
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  document.querySelectorAll('.lang-switch a').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      currentLang = link.getAttribute('data-lang');
      localStorage.setItem('adminLang', currentLang);
      updateUILanguage();
      loadOffers();
    });
  });

  document.getElementById('offerForm').addEventListener('submit', saveOffer);
  document.getElementById('resetBtn').addEventListener('click', resetForm);
  document.getElementById('deleteBtn').addEventListener('click', deleteOffer);

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await fetch('/api/admin/logout', {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (error) {
    } finally {
      window.location.href = 'admin-login.html';
    }
  });

  (async function init() {
    updateUILanguage();
    const ok = await checkSession();
    if (ok) {
      resetForm();
      loadOffers();
    }
  })();
</script>
</body>
</html>
